name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          docker run --rm -i \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            kivy/buildozer:latest \
            bash -lc "rm -rf bin .buildozer && pip install --upgrade buildozer cython && printf 'y\n' | buildozer android debug 2>&1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Baixador-de-Links-APK
          path: bin/*.apk
